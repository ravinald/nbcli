# Tag-triggered release. Push a vX.Y.Z tag and GoReleaser builds binaries
# for linux/darwin × amd64/arm64, generates SBOMs and SHA256 checksums,
# and publishes a GitHub Release with archives attached.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # GoReleaser needs this to create the Release
  packages: write   # for future container pushes
  id-token: write   # for SBOM signing (Sigstore-style)

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          # GoReleaser needs the full history + tags to compute changelog.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
