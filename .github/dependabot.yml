# Dependabot keeps Go modules and GitHub Actions up to date.
# Weekly cadence is calm enough not to be noise; security advisories
# still create immediate PRs regardless of schedule.

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
      include: scope
